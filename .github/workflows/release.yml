name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-gui:
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'octonote-gui-linux'
            platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - name: 'octonote-gui-windows'
            platform: 'windows/amd64'
            os: 'windows-latest'
          - name: 'octonote-gui-darwin'
            platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wails App
        uses: dAppServer/wails-build-action@v2.2
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          wails-dir: './gui'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build TUI Binaries
        run: |
          mkdir -p dist
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/octonote-linux-amd64 ./tui
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/octonote-linux-arm64 ./tui
          # Darwin amd64
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/octonote-darwin-amd64 ./tui
          # Darwin arm64
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/octonote-darwin-arm64 ./tui
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/octonote-windows-amd64.exe ./tui

      - name: Release CLI Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
